{{- if .Values.webserver.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "mtls-forward-proxy.fullname" . }}-webserver
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "mtls-forward-proxy.labels" . | nindent 4 }}
    app.kubernetes.io/component: webserver
spec:
  replicas: {{ .Values.webserver.replicaCount }}
  selector:
    matchLabels:
      {{- include "mtls-forward-proxy.selectorLabels.webserver" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "mtls-forward-proxy.selectorLabels.webserver" . | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/webserver-configmap.yaml") . | sha256sum }}
    spec:
      containers:
        - name: nginx
          image: "{{ .Values.webserver.image.repository }}:{{ .Values.webserver.image.tag }}"
          imagePullPolicy: {{ .Values.webserver.image.pullPolicy }}
          ports:
            - name: https
              containerPort: {{ .Values.webserver.service.port }}
              protocol: TCP
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
              readOnly: true
            - name: nginx-certs
              mountPath: /etc/nginx/certs
              readOnly: true
          readinessProbe:
            tcpSocket:
              port: {{ .Values.webserver.service.port }}
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: {{ .Values.webserver.service.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.webserver.resources | nindent 12 }}
      volumes:
        - name: nginx-config
          configMap:
            name: {{ include "mtls-forward-proxy.fullname" . }}-nginx-config
        - name: nginx-certs
          secret:
            secretName: {{ .Values.webserver.secret }}
            defaultMode: 0444
{{- end }}
