# ── Envoy mTLS forward proxy ──────────────────────────────────────────────────

envoy:
  image:
    repository: envoyproxy/envoy
    tag: v1.38-latest
    pullPolicy: IfNotPresent

  replicaCount: 1

  service:
    type: ClusterIP
    proxyPort: 3128
    adminPort: 9901

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

  # Names of pre-existing Kubernetes Secrets that hold the certificates.
  # Create them with `kubectl create secret generic` before installing the chart
  # (see charts/mtls-forward-proxy/README.md for the exact commands).
  secrets:
    downstreamCerts: envoy-downstream-certs   # wildcard cert presented to browser
    clientCerts: envoy-client-certs           # client cert/key presented to upstream backends
    upstreamCA: envoy-upstream-ca             # CA used to verify upstream backend server certs

  # Filenames of the wildcard cert/key within the downstreamCerts secret.
  # cert-manager issues secrets with tls.crt / tls.key by default.
  downstreamTLS:
    certFile: tls.crt
    keyFile: tls.key

  # Optional hostname → backend address overrides.
  # When a client CONNECTs to a hostname listed here, Envoy dials the given
  # address instead of resolving the hostname via DNS. Useful when the client-
  # facing hostname (e.g. api.example.com) differs from the in-cluster service
  # address (e.g. my-release-webserver.default.svc.cluster.local).
  # Leave empty to rely purely on DNS for all hosts.
  hostOverrides: []
  # Example:
  # hostOverrides:
  #   - hostname: api.example.com
  #     address: my-release-webserver.default.svc.cluster.local

  logLevel: info

# ── Demo nginx web-server ─────────────────────────────────────────────────────

webserver:
  enabled: true

  image:
    repository: nginx
    tag: "1.27"
    pullPolicy: IfNotPresent

  replicaCount: 1

  service:
    type: ClusterIP
    port: 443

  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

  # Name of the pre-existing Secret holding the nginx server cert/key and client CA.
  # Keys expected: server.crt, server.key, client-ca.crt
  secret: nginx-certs

# ── Shared metadata ───────────────────────────────────────────────────────────

nameOverride: ""
fullnameOverride: ""
namespace: default
