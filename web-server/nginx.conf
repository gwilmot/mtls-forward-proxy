events {}

http {
    # Plain HTTP listener - receives traffic from Envoy's CONNECT tunnel
    # (client sends plain HTTP; Envoy wraps the upstream connection in mTLS)
    server {
        listen 80;
        server_name api.example.com;

        location / {
            default_type text/html;
            return 200 '<!DOCTYPE html>\n<html>\n<head><title>Hello from api.example.com</title></head>\n<body>\n<h1>Hello World</h1>\n<p>mTLS offload successful — client certificate injected by Envoy proxy.</p>\n</body>\n</html>\n';
        }
    }

    # mTLS listener - Envoy connects here presenting client.crt (CN=scanner_sysid).
    # ssl_verify_client enforces that the client cert is signed by lab-ca.
    server {
        listen 443 ssl;
        server_name api.example.com;

        ssl_certificate     /etc/nginx/certs/server.crt;
        ssl_certificate_key /etc/nginx/certs/server.key;
        ssl_protocols       TLSv1.2 TLSv1.3;

        ssl_client_certificate /etc/nginx/certs/client-ca.crt;
        ssl_verify_client on;

        location / {
            default_type text/html;
            return 200 '<!DOCTYPE html>\n<html>\n<head><title>Hello from api.example.com</title></head>\n<body>\n<h1>Hello World</h1>\n<p>mTLS handshake successful.</p>\n<p>Client certificate CN: $ssl_client_s_dn</p>\n</body>\n</html>\n';
        }
    }
}
