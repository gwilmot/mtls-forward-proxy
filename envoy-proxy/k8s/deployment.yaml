apiVersion: apps/v1
kind: Deployment
metadata:
  name: envoy-mtls-proxy
  namespace: default
  labels:
    app: envoy-mtls-proxy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: envoy-mtls-proxy
  template:
    metadata:
      labels:
        app: envoy-mtls-proxy
    spec:
      containers:
        - name: envoy
          image: envoyproxy/envoy:v1.38-latest
          args:
            - -c
            - /etc/envoy/envoy.yaml
            - --log-level
            - info
          ports:
            - name: proxy
              containerPort: 3128
              protocol: TCP
            - name: admin
              containerPort: 9901
              protocol: TCP
          volumeMounts:
            - name: envoy-config
              mountPath: /etc/envoy/envoy.yaml
              subPath: envoy.yaml
              readOnly: true
            - name: downstream-certs
              mountPath: /etc/envoy/certs
              readOnly: true
            - name: client-certs
              mountPath: /etc/envoy/client-certs
              readOnly: true
            - name: upstream-ca
              mountPath: /etc/envoy/upstream-ca
              readOnly: true
            - name: tmp
              mountPath: /tmp
          livenessProbe:
            tcpSocket:
              port: 3128
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: 3128
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1001
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: envoy-config
          configMap:
            name: envoy-config
        - name: downstream-certs
          secret:
            secretName: envoy-downstream-certs
            defaultMode: 0444
        - name: client-certs
          secret:
            secretName: envoy-client-certs
            defaultMode: 0444
        - name: upstream-ca
          secret:
            secretName: envoy-upstream-ca
            defaultMode: 0444
        - name: tmp
          emptyDir: {}
